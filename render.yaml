staticSites:
  - name: luxe-perfume-frontend
    buildCommand: npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
    rewrites:
      - source: /api
        destination: https://luxe-perfume-api.onrender.com/api
      - source: /**
        destination: /index.html
